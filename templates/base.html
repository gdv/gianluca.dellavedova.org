<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="me" href="https://mastodon.uno/@dellavg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simpledotcss/simple.min.css">
  <link rel="stylesheet" href="/style.css">
  {% block head %}{% endblock %}
  <script>
  (function() {
    var theme;
    try { theme = localStorage.getItem('theme'); } catch(e) {}
    if (!theme) {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();
  </script>
</head>
<body>
  <header>
    <h1>{{ config.title }}</h1>
    <nav>
      <a href="/" {% if current_path and current_path == "/" %}class="current"{% endif %}>Home</a>
      <a href="/blog" {% if current_path and current_path is starting_with("/blog") %}class="current"{% endif %}>Blog</a>
      <a href="https://www.unimib.it/gianluca-della-vedova">Didattica</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p><small>© {{ now() | date(format="%Y") }} {{ config.author }}</small></p>
  </footer>

</body>
</html>
