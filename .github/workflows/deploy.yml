name: Deploy Zola site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZOLA_VERSION: 0.22.1
      TZ: Europe/Rome
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Install Zola
        run: |
          curl -sLJO "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p "${HOME}/.local/bin"
          tar -C "${HOME}/.local/bin" -xf "zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          rm "zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
      - name: Verify installation
        run: |
          echo "Zola: $(zola --version)"
      - name: Build the site
        run: |
          zola build --base-url "${{ steps.pages.outputs.base_url }}"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
